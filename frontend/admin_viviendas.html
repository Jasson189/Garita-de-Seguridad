<!-- Panel administrativo para CRUD de viviendas -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Viviendas - Garita</title>

    <link rel="stylesheet" href="css/admin_viviendas.css">
</head>

<body>

    <main class="contenedor">

        <section class="encabezado">

            <div>
                <h1>Administración de Viviendas</h1>
                <p>Gestión de casas, sectores y referencias del residencial.</p>
            </div>

            <div class="acciones-header">

                <a href="index.html" class="btn-volver">
                    Volver
                </a>

                <button id="btnNuevaVivienda" class="btn btn-primario">
                    + Nueva vivienda
                </button>

            </div>

        </section>

        <section class="barra-superior">

            <input
                type="text"
                id="txtBuscar"
                placeholder="Buscar por número, sector o referencia..."
                autocomplete="off"
            >

        </section>

        <section class="tabla-contenedor">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Número vivienda</th>
                        <th>Sector</th>
                        <th>Referencia</th>
                        <th>Estado</th>
                        <th>Fecha registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaViviendas">
                    <!-- Aqui se cargan las viviendas con JavaScript -->
                </tbody>

            </table>

        </section>

    </main>

    <!-- Modal crear / editar vivienda -->
    <div id="modalVivienda" class="modal oculto">

        <div class="modal-contenido">

            <div class="modal-header">

                <h2 id="tituloModal">Nueva vivienda</h2>

                <button id="btnCerrarModal" class="btn-cerrar">
                    ×
                </button>

            </div>

            <form id="formVivienda">

                <input type="hidden" id="id_vivienda">

                <div class="grupo-form">
                    <label for="numero_vivienda">Número de vivienda</label>

                    <input
                        type="text"
                        id="numero_vivienda"
                        placeholder="Ejemplo: Casa 1, A-101, Lote 5"
                        required
                    >
                </div>

                <div class="grupo-form">
                    <label for="sector">Sector</label>

                    <input
                        type="text"
                        id="sector"
                        placeholder="Ejemplo: Sector A"
                    >
                </div>

                <div class="grupo-form">
                    <label for="direccion_referencia">Dirección o referencia</label>

                    <textarea
                        id="direccion_referencia"
                        rows="3"
                        placeholder="Ejemplo: Frente al parque, cerca de la entrada..."
                    ></textarea>
                </div>

                <div class="grupo-form grupo-estado" id="grupoEstado">

                    <label for="estado">Estado</label>

                    <select id="estado">
                        <option value="true">Activa</option>
                        <option value="false">Inactiva</option>
                    </select>

                </div>

                <div class="acciones-modal">

                    <button type="button" id="btnCancelar" class="btn btn-secundario">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-primario">
                        Guardar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        validarRol(["Administrador"]);
    </script>
    <script src="js/admin_viviendas.js"></script>
</body>

</html>
